<script>
function generatePoster() {

  const prompt = document.getElementById("prompt").value.trim();
  const img = document.getElementById("poster");
  const status = document.getElementById("status");

  if (!prompt) {
    status.textContent = "Please enter a prompt.";
    img.style.display = "none";
    return;
  }

  status.textContent = "Generating poster...";
  img.style.display = "none";

  const url = "https://source.unsplash.com/900x900/?" + encodeURIComponent(prompt + ", poster, advertisement");

  img.onload = function () {
    status.textContent = "Poster generated.";
    img.style.display = "block";
  };

  img.onerror = function () {
    status.textContent = "Image failed to load.";
    img.style.display = "none";
  };

  img.src = url;
}
</script>
