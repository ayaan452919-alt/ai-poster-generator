<!DOCTYPE html>
<html>
<head>
  <title>AI Poster Generator</title>
</head>

<body style="text-align:center; padding:40px; font-family:Arial; background:#f4f6f9;">

<h1 style="font-size:32px;">🎨 AI Poster Generator</h1>
<p style="color:#555;">Create professional advertisement posters using AI</p>

<input id="prompt" placeholder="Enter idea (e.g. saree shop opening)"
style="padding:12px; width:60%; max-width:400px; border-radius:8px; border:1px solid #ccc;">

<button onclick="generatePoster()"
style="padding:12px 20px; margin-left:10px; border:none; background:#007bff; color:white; border-radius:8px;">
Generate
</button>

<p id="status" style="margin-top:15px; color:#555;"></p>

<!-- POSTER -->
<div style="position:relative; display:inline-block; margin-top:20px;">
  
  <img id="poster" style="max-width:90%; border-radius:12px;" />
  
  <h2 id="posterText" style="
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:8px;">
  </h2>

</div>

<br>

<button id="downloadBtn"
style="display:none; margin-top:10px; padding:10px 15px; border:none; background:#28a745; color:white; border-radius:8px;">
Download Poster
</button>

<script>
function generatePoster() {

  let prompt = document.getElementById("prompt").value;
  let img = document.getElementById("poster");
  let status = document.getElementById("status");
  let text = document.getElementById("posterText");
  let downloadBtn = document.getElementById("downloadBtn");

  if (!prompt) {
    status.innerText = "Enter something 😅";
    return;
  }

  status.innerText = "Generating poster...";

  // Image from Unsplash (based on your idea)
 let url = "https://picsum.photos/800/800?random=" + new Date().getTime();

  // Taglines
  let taglines = [
    "Grand Opening 🎉",
    "Flat 50% OFF 🔥",
    "Limited Time Offer ⏳",
    "New Collection Arrived ✨",
    "Visit Today 🛍️"
  ];

  let randomTagline = taglines[Math.floor(Math.random() * taglines.length)];

  // Poster text
  text.innerText = prompt.toUpperCase() + " - " + randomTagline;

  img.onload = () => {
    status.innerText = "Done ✅";
    downloadBtn.style.display = "inline-block";
  };

 img.onerror = () => {
  status.innerText = "Retrying...";
  img.src = "https://picsum.photos/800/800?random=" + new Date().getTime();
};
  };

  img.src = "";
setTimeout(() => {
  img.src = url;
}, 100);
}

// Download
document.getElementById("downloadBtn").onclick = () => {
  let link = document.createElement("a");
  link.href = document.getElementById("poster").src;
  link.download = "poster.png";
  link.click();
};
</script>

</body>
</html>
