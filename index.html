<!DOCTYPE html>
<html>
<head>
  <title>AI Poster Generator</title>
</head>

<body style="text-align:center; padding:40px; font-family:Arial; background:#f4f6f9;">

<h1>🎨 AI Poster Generator</h1>
<p>Create posters using AI</p>

<input id="prompt" placeholder="Enter idea"
style="padding:10px; width:60%; max-width:400px;">

<button onclick="generatePoster()">Generate</button>

<p id="status"></p>

<div style="position:relative; display:inline-block; margin-top:20px;">
  <img id="poster" style="max-width:90%;">
  <h2 id="posterText" style="
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:black;
    padding:8px;">
  </h2>
</div>

<br><br>

<button id="downloadBtn" style="display:none;">Download</button>
<script>
function generatePoster() {

  let prompt = document.getElementById("prompt").value;
  let img = document.getElementById("poster");
  let status = document.getElementById("status");
  let text = document.getElementById("posterText");
  let downloadBtn = document.getElementById("downloadBtn");

  if (!prompt) {
    status.innerText = "Enter something 😅";
    return;
  }

  status.innerText = "Generating AI poster... ⏳";

  fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt: prompt })
  })
  .then(res => res.json())
  .then(data => {
    if (data.image) {
      img.src = data.image;
      text.innerText = prompt.toUpperCase();
      status.innerText = "Done ✅";
      downloadBtn.style.display = "inline";
    } else {
      status.innerText = "Failed 😢";
    }
  })
  .catch(() => {
    status.innerText = "Error 😭";
  });
}
</script>



</body>
</html>
