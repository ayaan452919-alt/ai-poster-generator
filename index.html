      <!DOCTYPE html>
<html>
<head>
  <title>AI Poster Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 300px;
      border-radius: 10px;
    }

    #posterText {
      position: relative;
      top: -60px;
      color: white;
      background: black;
      display: inline-block;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

  <h2>🎨 AI Poster Generator</h2>

  <input id="prompt" placeholder="Enter business idea" />
  <button onclick="generatePoster()">Generate</button>

  <p id="status"></p>

  <div>
    <img id="poster" />
    <h3 id="posterText"></h3>
  </div>

  <button id="downloadBtn" style="display:none;" onclick="downloadImage()">Download</button>

  <script>
    function generatePoster() {
      let prompt = document.getElementById("prompt").value;
      let img = document.getElementById("poster");
      let status = document.getElementById("status");
      let text = document.getElementById("posterText");
      let downloadBtn = document.getElementById("downloadBtn");

      if (!prompt) {
        status.innerText = "Enter something 😅";
        return;
      }

      status.innerText = "Generating... ⏳";

      const finalPrompt = prompt + ", professional advertisement poster, modern design, branding, bold text";

      const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(finalPrompt);

      img.src = imageUrl;

      img.onload = () => {
        status.innerText = "Done ✅";
        text.innerText = prompt.toUpperCase();
        downloadBtn.style.display = "inline";
      };

      img.onerror = () => {
        status.innerText = "Failed ❌";
      };
    }

    function downloadImage() {
      let img = document.getElementById("poster").src;
      let a = document.createElement("a");
      a.href = img;
      a.download = "poster.png";
      a.click();
    }
  </script>

</body>
</html>
