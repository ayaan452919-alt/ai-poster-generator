<!DOCTYPE html>
<html>
<head>
  <title>AI Poster Generator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f4f4f4;
    }

    h1 {
      font-size: 40px;
    }

    input {
      padding: 12px;
      width: 60%;
      max-width: 400px;
    }

    button {
      padding: 12px 20px;
      margin-left: 10px;
      cursor: pointer;
    }

    img {
      margin-top: 30px;
      max-width: 90%;
      display: none;
    }

    #status {
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>AI Poster Generator</h1>
  <p>Create advertisement posters using AI</p>

  <input id="prompt" placeholder="Enter poster idea">
  <button onclick="generatePoster()">Generate Poster</button>

  <div id="status"></div>
  <img id="poster">

  <script>
function generatePoster() {

  let prompt = document.getElementById("prompt").value;
  let img = document.getElementById("poster");
  let status = document.getElementById("status");

  if (!prompt) {
    status.innerText = "Please enter a prompt";
    return;
  }

  status.innerText = "Generating poster...";

let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt + " poster design");
  img.onload = function () {
    status.innerText = "Poster generated!";
    img.style.display = "block";
  };

  img.onerror = function () {
    status.innerText = "Failed to load image";
  };

  img.src = url;
}
  </script>
