<!DOCTYPE html>
<html>
<head>
  <title>AI Poster Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 300px;
      border-radius: 10px;
    }

    #posterText {
      position: relative;
      top: -60px;
      color: white;
      background: black;
      display: inline-block;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

  <h2>🎨 AI Poster Generator</h2>

  <input id="prompt" placeholder="Enter business idea" />
  <button onclick="generatePoster()">Generate</button>

  <p id="status"></p>

  <div>
    <img id="poster" />
    <h3 id="posterText"></h3>
  </div>

  <button id="downloadBtn" style="display:none;" onclick="downloadImage()">Download</button>

  <script>
    function generatePoster() {
      let prompt = document.getElementById("prompt").value;
      let img = document.getElementById("poster");
      let status = document.getElementById("status");
      let text = document.getElementById("posterText");
      let downloadBtn = document.getElementById("downloadBtn");

      if (!prompt) {
        status.innerText = "Enter something 😅";
        return;
      }

      status.innerText = "Generating... ⏳";

      fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt: prompt })
      })
      .then(res => res.json())
      .then(data => {
        if (data && data.image) {
          img.src = data.image;
          text.innerText = prompt.toUpperCase();
          status.innerText = "Done ✅";
          downloadBtn.style.display = "inline";
        } else {
          status.innerText = "Failed ❌";
        }
      })
      .catch(() => {
        status.innerText = "Error 🚨";
      });
    }

    function downloadImage() {
      let img = document.getElementById("poster").src;
      let a = document.createElement("a");
      a.href = img;
      a.download = "poster.png";
      a.click();
    }
  </script
